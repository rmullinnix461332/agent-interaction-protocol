apiVersion: aip/v0.1
kind: Flow
metadata:
  name: research-publish
  title: Research, Review, and Publish
  version: "1.0"
  description: Fan-out research, summarize, await human input, iterate revisions until approval, then publish

participants:
  - id: researcher-a
    kind: agent
    title: Researcher A
    description: Investigates angle A

  - id: researcher-b
    kind: agent
    title: Researcher B
    description: Investigates angle B

  - id: researcher-c
    kind: agent
    title: Researcher C
    description: Investigates angle C

  - id: summarizer
    kind: agent
    title: Summarizer
    description: Synthesizes research into a draft

  - id: human-reviewer
    kind: human
    title: Human Reviewer
    description: Reviews and approves or requests changes

  - id: reviser
    kind: agent
    title: Reviser
    description: Revises draft based on feedback

  - id: publisher
    kind: agent
    title: Publisher
    description: Publishes the final approved document

artifacts:
  - ref: aip://artifact/research-a
    producer: researcher-a
    consumers: [summarizer]

  - ref: aip://artifact/research-b
    producer: researcher-b
    consumers: [summarizer]

  - ref: aip://artifact/research-c
    producer: researcher-c
    consumers: [summarizer]

  - ref: aip://artifact/draft
    contentType: text/markdown
    producer: summarizer
    consumers: [human-reviewer, reviser]

  - ref: aip://artifact/feedback
    contentType: text/markdown
    producer: human-reviewer
    consumers: [reviser]

  - ref: aip://artifact/revised-draft
    contentType: text/markdown
    producer: reviser
    consumers: [human-reviewer, publisher]

  - ref: aip://artifact/published
    producer: publisher

steps:
  - id: research
    type: fanOut
    title: Research
    steps:
      - research-a
      - research-b
      - research-c

  - id: research-a
    type: action
    title: Research A
    participantRef: researcher-a
    produces:
      - aip://artifact/research-a

  - id: research-b
    type: action
    title: Research B
    participantRef: researcher-b
    produces:
      - aip://artifact/research-b

  - id: research-c
    type: action
    title: Research C
    participantRef: researcher-c
    produces:
      - aip://artifact/research-c

  - id: research-join
    type: fanIn
    title: Collect Research
    dependsOn: [research]
    operator:
      type: summarize
      mode: comprehensive
      config:
        style: narrative

  - id: summarize
    type: action
    title: Summarize
    participantRef: summarizer
    dependsOn: [research-join]
    consumes:
      - aip://artifact/research-a
      - aip://artifact/research-b
      - aip://artifact/research-c
    produces:
      - aip://artifact/draft

  - id: await-review
    type: await
    title: Await Human Review
    dependsOn: [summarize]
    awaitInput:
      ref: aip://artifact/feedback
      contentType: text/markdown
      sourceParticipantRef: human-reviewer
      description: Human reviews the draft and provides approval or feedback

  - id: revision-loop
    type: action
    title: Revise
    participantRef: reviser
    dependsOn: [await-review]
    consumes:
      - aip://artifact/draft
      - aip://artifact/feedback
    produces:
      - aip://artifact/revised-draft
    iteration:
      mode: while
      condition:
        status: not-approved
      strategy: serial
      outputMode: replace
      onItemFailure: stop
      maxIterations: 5
      timeout: PT24H

  - id: publish
    type: action
    title: Publish
    participantRef: publisher
    dependsOn: [revision-loop]
    consumes:
      - aip://artifact/revised-draft
    produces:
      - aip://artifact/published

  - id: done
    type: exit
    title: Done
    dependsOn: [publish]
    exit:
      status: success
      message: Research published successfully
